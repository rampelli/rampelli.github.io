<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon | EAPCET</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #f8fafc;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

      .card {
        text-align: center;
        max-width: 720px;
        width: 100%;
        padding: 2.5rem;
        border-radius: 1rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.25);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 5vw, 3.5rem);
      }

      p {
        margin: 0 0 1.5rem;
        color: #cbd5e1;
        font-size: 1.075rem;
      }

      .subtle {
        color: #94a3b8;
        font-size: 0.92rem;
      }

      .progress {
        margin-top: 1.5rem;
        height: 0.65rem;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.3);
        overflow: hidden;
      }

      .progress > span {
        display: block;
        width: 10%;
        height: 100%;
        background: linear-gradient(90deg, #38bdf8, #8b5cf6);
        border-radius: inherit;
        animation: animateProgress 2.6s ease-in-out infinite;
      }

      @keyframes animateProgress {
        0% {
          transform: translateX(-110%);
        }
        40% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(110%);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Coming Soon</h1>
      <p>
        The new EAPCET website is under development. We’re setting up something great for students, with resources, news, and exam tips.
      </p>
      <p class="subtle">Stay tuned — check back in a few days for the full launch.</p>
      <div class="progress"><span></span></div>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon | EAPCET</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #f8fafc;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

      .card {
        text-align: center;
        max-width: 720px;
        width: 100%;
        padding: 2.5rem;
        border-radius: 1rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.25);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 5vw, 3.5rem);
      }

      p {
        margin: 0 0 1.5rem;
        color: #cbd5e1;
        font-size: 1.075rem;
      }

      .subtle {
        color: #94a3b8;
        font-size: 0.92rem;
      }

      .install-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.75rem 1.25rem;
        border-radius: 999px;
        font-size: 1.05rem;
        font-weight: 700;
        color: #0f172a;
        background: linear-gradient(90deg, #34d399, #06b6d4);
        border: 2px solid #22c55e;
        text-decoration: none;
        box-shadow: 0 10px 20px rgba(51, 65, 85, 0.35);
        transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      }

      .install-link:hover,
      .install-link:focus-visible {
        transform: translateY(-2px);
        box-shadow: 0 14px 24px rgba(15, 23, 42, 0.48);
        filter: brightness(1.05);
      }

      .install-link:active {
        transform: translateY(0);
      }

      .progress {
        margin-top: 1.5rem;
        height: 0.65rem;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.3);
        overflow: hidden;
      }

      .progress > span {
        display: block;
        width: 10%;
        height: 100%;
        background: linear-gradient(90deg, #38bdf8, #8b5cf6);
        border-radius: inherit;
        animation: animateProgress 2.6s ease-in-out infinite;
      }

      @keyframes animateProgress {
        0% {
          transform: translateX(-110%);
        }
        40% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(110%);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Coming Soon</h1>
      <p>
        The new EAPCET website is under development. We’re setting up something great for students, with resources, news, and exam tips.
      </p>
      <p class="subtle">Stay tuned — check back in a few days for the full launch.</p>
      <a
        id="installLink"
        class="install-link"
        rel="noopener"
        href="https://play.google.com/store/apps/details?id=com.eapcet.eapcet_app&referrer=utm_source%3Dinstagram%26utm_medium%3Dprofile_sai%26utm_campaign%3Dig_sai_eapcet%26utm_content%3Dinstagram_lead_link"
        target="_blank"
      >
        Install App on Play Store
      </a>
      <div class="progress"><span></span></div>
    </main>
  </body>
</html>
